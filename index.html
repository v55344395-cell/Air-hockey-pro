<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Air Hockey!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

/* ── TIER BACKGROUNDS ─────────────────────────────── */
body{
font-family:‘Lilita One’,cursive;
overflow:hidden;height:100vh;
display:flex;align-items:center;justify-content:center;flex-direction:column;
position:relative;
transition:background 1.4s ease;
}
/* Bronze 0–999 */
body.t0{ background:linear-gradient(145deg,#ffe14d 0%,#ffaa33 38%,#ff6699 72%,#dd44ff 100%); }
/* Silver 1000–1999 */
body.t1{ background:linear-gradient(145deg,#d0e8ff 0%,#88aaee 35%,#5544cc 68%,#220099 100%); }
/* Gold 2000–2999 */
body.t2{ background:linear-gradient(145deg,#fff176 0%,#ffcc00 35%,#ff8800 65%,#cc4400 100%); }
/* Blood 3000+ */
body.t3{ background:linear-gradient(145deg,#ff5555 0%,#cc1111 32%,#880000 62%,#330000 100%); }

/* Bubbles */
.bub{
position:fixed;border-radius:50%;
background:rgba(255,255,255,0.13);
animation:floatUp linear infinite;
pointer-events:none;z-index:0;
}
@keyframes floatUp{
0%  {transform:translateY(110vh) scale(.4);opacity:0;}
10% {opacity:1;}
80% {opacity:.45;}
100%{transform:translateY(-20vh) scale(1.35);opacity:0;}
}

/* ── MENU ─────────────────────────────────────────── */
#menu{
position:relative;z-index:10;
display:flex;flex-direction:column;align-items:center;gap:13px;
max-width:390px;width:100%;padding:0 15px;
}

.logo-wrap{
background:linear-gradient(135deg,#fffde4 0%,#fff5b0 100%);
border-radius:24px;padding:11px 28px 7px;
box-shadow:0 7px 0 #c99600,0 11px 26px rgba(0,0,0,.22);
text-align:center;border:4px solid rgba(255,255,255,.9);
transform:rotate(-2deg);
}
.logo-main{
font-family:‘Lilita One’,cursive;
font-size:clamp(38px,8vw,66px);
line-height:1;letter-spacing:0.04em;
color:#ff3d00;
/* cartoon outline */
-webkit-text-stroke:3.5px #ffe0b2;
paint-order:stroke fill;
text-shadow:
4px 5px 0 #b71c00,
7px 8px 14px rgba(0,0,0,.16);
}
.logo-sub{
font-family:‘Nunito’,sans-serif;font-weight:900;
font-size:10px;color:#cc6600;letter-spacing:.28em;margin-top:0;
text-transform:uppercase;
}

.elo-card{
width:100%;
background:linear-gradient(135deg,#ffffff 0%,#f4eeff 100%);
border-radius:20px;padding:13px 18px;
box-shadow:0 5px 0 rgba(0,0,0,.18),0 9px 22px rgba(0,0,0,.13);
border:3px solid rgba(255,255,255,.9);position:relative;overflow:hidden;
}
.elo-card::after{
content:’’;position:absolute;top:-38px;right:-38px;width:110px;height:110px;
border-radius:50%;background:radial-gradient(circle,rgba(255,210,50,.22),transparent);
pointer-events:none;
}
.elo-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.elo-lbl{
font-family:‘Nunito’,sans-serif;font-weight:900;
font-size:10px;color:#bbb;letter-spacing:.15em;text-transform:uppercase;
}
.tier-badge{
font-family:‘Lilita One’,cursive;
font-size:14px;padding:2px 13px;border-radius:20px;letter-spacing:.04em;
}
.tbr{background:#f5deb3;color:#7a4400;border:2.5px solid #cd853f;}
.tsi{background:#e6e6e6;color:#444;border:2.5px solid #999;}
.tgo{background:#fff9c4;color:#996600;border:2.5px solid #d4a000;}
.tbl{background:#ffcccc;color:#7a0000;border:2.5px solid #cc2222;}

.elo-number{
font-family:‘Lilita One’,cursive;
font-size:clamp(48px,10vw,68px);line-height:1;
color:#222;
text-shadow:3px 3px 0 rgba(0,0,0,.08);
}
.elo-rates{
font-family:‘Nunito’,sans-serif;font-weight:900;font-size:13px;
color:#999;display:flex;gap:14px;
margin-top:7px;border-top:2px dashed #eee;padding-top:7px;
}
.pos{color:#16a34a;font-size:14px;}
.neg{color:#dc2626;font-size:14px;}

.stats-bar{display:flex;width:100%;gap:6px;}
.stat-box{
flex:1;background:#fff;border-radius:14px;padding:8px 4px;text-align:center;
box-shadow:0 4px 0 rgba(0,0,0,.11),0 6px 14px rgba(0,0,0,.07);
border:2.5px solid rgba(255,255,255,.8);
}
.stat-val{font-family:‘Lilita One’,cursive;font-size:26px;line-height:1;color:#333;}
.stat-key{
font-family:‘Nunito’,sans-serif;font-size:9px;font-weight:900;
color:#bbb;letter-spacing:.15em;text-transform:uppercase;margin-top:1px;
}

.btn-start{
width:100%;font-family:‘Lilita One’,cursive;font-size:26px;letter-spacing:.05em;
padding:13px;
background:linear-gradient(135deg,#ff7700,#ff1166);
color:#fff;border:none;border-radius:18px;cursor:pointer;
box-shadow:0 6px 0 #aa0040,0 10px 24px rgba(255,40,80,.36);
transition:transform .1s,box-shadow .1s;
position:relative;overflow:hidden;
-webkit-text-stroke:1px rgba(0,0,0,.08);
}
.btn-start::after{
content:’’;position:absolute;top:0;left:-100%;width:55%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
animation:shine 2.8s ease infinite;
}
@keyframes shine{0%{left:-100%;}55%,100%{left:150%;}}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 9px 0 #aa0040,0 14px 28px rgba(255,40,80,.5);}
.btn-start:active{transform:translateY(3px);box-shadow:0 2px 0 #aa0040;}

/* ── GAME ─────────────────────────────────────────── */
#game{display:none;position:relative;z-index:10;flex-direction:column;align-items:center;gap:5px;}

.hud{
display:flex;align-items:center;justify-content:space-between;
width:100%;max-width:390px;padding:0 2px;
}
.hud-side{text-align:center;min-width:74px;}
.hud-lbl{
font-family:‘Nunito’,sans-serif;font-weight:900;font-size:9px;
letter-spacing:.25em;color:rgba(255,255,255,.7);text-transform:uppercase;
}
.hud-score{
font-family:‘Lilita One’,cursive;font-size:52px;line-height:1;
-webkit-text-stroke:2px rgba(0,0,0,.12);
text-shadow:3px 3px 0 rgba(0,0,0,.14);
}
.hud-score.p{color:#fff;}
.hud-score.a{color:#ffe94a;}

.hud-center{text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;}
.hud-elo-pill{
font-family:‘Lilita One’,cursive;font-size:13px;
color:rgba(255,255,255,.9);
background:rgba(0,0,0,.22);
border-radius:20px;padding:1px 11px;display:inline-block;
}
.hud-elo-pill span{color:#ffe94a;}

.hud-timer{
font-family:‘Lilita One’,cursive;font-size:24px;line-height:1;
color:#fff;
background:rgba(0,0,0,.26);
border-radius:12px;padding:0px 11px 2px;
min-width:64px;text-align:center;
text-shadow:2px 2px 0 rgba(0,0,0,.18);
transition:color .25s,background .25s;
}
.hud-timer.warn{
color:#ff3333;background:rgba(160,0,0,.38);
animation:timerPulse .55s ease infinite;
}
@keyframes timerPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}

.hud-msg{
font-family:‘Lilita One’,cursive;font-size:13px;
color:rgba(255,255,255,.65);min-height:16px;
}

.canvas-outer{
border-radius:15px;overflow:hidden;
box-shadow:
0 0 0 4px rgba(255,255,255,.28),
0 18px 54px rgba(0,0,0,.3),
0 0 0 7px rgba(0,0,0,.08);
}
#cv{display:block;}

/* ── OVERLAY ──────────────────────────────────────── */
#overlay{
display:none;position:fixed;inset:0;z-index:200;
align-items:center;justify-content:center;flex-direction:column;
background:rgba(10,0,25,.78);backdrop-filter:blur(18px);
}
.ov-card{
background:linear-gradient(135deg,#fff 0%,#f5f0ff 100%);
border-radius:26px;padding:22px 32px;text-align:center;
box-shadow:0 8px 0 #7722bb,0 16px 48px rgba(0,0,0,.34);
border:4px solid #fff;min-width:265px;
display:flex;flex-direction:column;align-items:center;gap:9px;
}
.ov-result{
font-family:‘Lilita One’,cursive;
font-size:clamp(38px,8vw,62px);line-height:1;
-webkit-text-stroke:1.5px rgba(0,0,0,.07);
}
.ov-result.win {color:#16a34a;text-shadow:3px 3px 0 #0d6e2a;}
.ov-result.lose{color:#dc2626;text-shadow:3px 3px 0 #961212;}
.ov-result.draw{color:#f59e0b;text-shadow:3px 3px 0 #a06000;}

.ov-score-txt{font-family:‘Lilita One’,cursive;font-size:28px;color:#999;}
.ov-time-txt{font-family:‘Nunito’,sans-serif;font-weight:900;font-size:11px;color:#ccc;letter-spacing:.1em;text-transform:uppercase;margin-top:-4px;}

.ov-elo-box{
background:linear-gradient(135deg,#f0f9ff,#ece8ff);
border-radius:12px;padding:8px 20px;
font-family:‘Nunito’,sans-serif;font-weight:900;font-size:15px;color:#555;
border:2px solid #dde0ff;
}
.edp{color:#16a34a;font-size:18px;}
.edn{color:#dc2626;font-size:18px;}
.enew{color:#f59e0b;font-size:18px;}

.ov-btns{display:flex;flex-direction:column;gap:8px;width:100%;}
.ov-btn{
width:100%;font-family:‘Lilita One’,cursive;font-size:20px;letter-spacing:.03em;
padding:11px;border-radius:14px;cursor:pointer;border:none;transition:all .1s;
}
.ov-btn.again{
background:linear-gradient(135deg,#ff7700,#ff1166);color:#fff;
box-shadow:0 4px 0 #aa0040;
}
.ov-btn.again:hover{transform:translateY(-2px);}
.ov-btn.again:active{transform:translateY(2px);box-shadow:0 1px 0 #aa0040;}
.ov-btn.back{background:#f0f0f0;color:#888;box-shadow:0 3px 0 #ccc;}
.ov-btn.back:hover{background:#e5e5e5;color:#555;}
</style>

</head>
<body class="t0">

<!-- Bubbles -->

<script>
for(let i=0;i<14;i++){
  const b=document.createElement('div');b.className='bub';
  const s=28+Math.random()*75;
  b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;
    animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*9}s;`;
  document.body.appendChild(b);
}
</script>

<!-- MENU -->

<div id="menu">
  <div class="logo-wrap">
    <div class="logo-main">AIR HOCKEY!</div>
    <div class="logo-sub">⭐ Ranked Edition ⭐</div>
  </div>
  <div class="elo-card">
    <div class="elo-top">
      <div class="elo-lbl">Рейтинг ЭЛО</div>
      <div id="tierBadge" class="tier-badge tbr">🥉 Bronze</div>
    </div>
    <div class="elo-number" id="menuElo">0</div>
    <div class="elo-rates">
      <span>Победа: <span class="pos" id="rW">+30</span></span>
      <span>Поражение: <span class="neg" id="rL">-10</span></span>
      <span>Ничья: <span class="pos" id="rD">+15</span></span>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-box"><div class="stat-val" id="sW">0</div><div class="stat-key">Победы</div></div>
    <div class="stat-box"><div class="stat-val" id="sL">0</div><div class="stat-key">Пораж.</div></div>
    <div class="stat-box"><div class="stat-val" id="sD">0</div><div class="stat-key">Ничьи</div></div>
    <div class="stat-box"><div class="stat-val" id="sG">0</div><div class="stat-key">Игры</div></div>
  </div>
  <button class="btn-start" onclick="startGame()">▶ Начать Бой!</button>
</div>

<!-- GAME -->

<div id="game">
  <div class="hud">
    <div class="hud-side">
      <div class="hud-lbl">ВЫ</div>
      <div class="hud-score p" id="hP">0</div>
    </div>
    <div class="hud-center">
      <div class="hud-elo-pill">ELO <span id="hE">0</span></div>
      <div class="hud-timer" id="hTimer">1:30</div>
      <div class="hud-msg" id="hMsg"></div>
    </div>
    <div class="hud-side">
      <div class="hud-lbl">ИИ</div>
      <div class="hud-score a" id="hA">0</div>
    </div>
  </div>
  <div class="canvas-outer">
    <canvas id="cv"></canvas>
  </div>
</div>

<!-- OVERLAY -->

<div id="overlay">
  <div class="ov-card">
    <div class="ov-result" id="ovRes">ПОБЕДА!</div>
    <div class="ov-score-txt" id="ovSc">7 : 2</div>
    <div class="ov-time-txt" id="ovReason"></div>
    <div class="ov-elo-box" id="ovEl"></div>
    <div class="ov-btns">
      <button class="ov-btn again" onclick="startGame()">↺ Ещё раз!</button>
      <button class="ov-btn back" onclick="goMenu()">← Меню</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════
const AC=new(window.AudioContext||window.webkitAudioContext)();
const res=()=>{if(AC.state==='suspended')AC.resume();};

function sndHit(hard){
  res();
  const o=AC.createOscillator(),g=AC.createGain(),d=AC.createWaveShaper();
  const c=new Float32Array(256);
  for(let i=0;i<256;i++){const x=i*2/255-1;c[i]=hard?x*3/(1+2*Math.abs(x)):x*(3-x*x)/2;}
  d.curve=c;o.connect(d);d.connect(g);g.connect(AC.destination);
  o.type='sawtooth';
  o.frequency.setValueAtTime(hard?280:180,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(hard?48:28,AC.currentTime+.13);
  g.gain.setValueAtTime(hard?.50:.36,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.19);
  o.start();o.stop(AC.currentTime+.22);
}
function sndWall(){
  res();
  const b=AC.createBuffer(1,AC.sampleRate*.04,AC.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.2);
  const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
  s.buffer=b;f.type='bandpass';f.frequency.value=800;f.Q.value=3;
  s.connect(f);f.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(.28,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.07);
  s.start();
}
function sndGoal(type){
  // type: 'win' | 'lose' | 'draw'
  res();
  const fs=type==='win' ?[523,659,784,1047,1319]
          :type==='lose'?[370,330,294,247,220]
          :[440,440,554,494];
  fs.forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type==='win'?'sine':'triangle';o.frequency.value=f;
    const t=AC.currentTime+i*.1;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.24,t+.04);
    g.gain.exponentialRampToValueAtTime(.001,t+.4);
    o.start(t);o.stop(t+.5);
  });
}
function sndTick(){
  res();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type='square';o.frequency.value=900;
  g.gain.setValueAtTime(.07,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.06);
  o.start();o.stop(AC.currentTime+.08);
}
function sndClick(){
  res();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type='sine';
  o.frequency.setValueAtTime(700,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(1100,AC.currentTime+.07);
  g.gain.setValueAtTime(.1,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.1);
  o.start();o.stop(AC.currentTime+.12);
}

// ══════════════════════════════════════════════
//  TIER / THEME
// ══════════════════════════════════════════════
const TIERS=[
  {min:0,    max:999,   cls:'t0', badge:'tbr', label:'🥉 Bronze'},
  {min:1000, max:1999,  cls:'t1', badge:'tsi', label:'🥈 Silver'},
  {min:2000, max:2999,  cls:'t2', badge:'tgo', label:'🥇 Gold'},
  {min:3000, max:Infinity,cls:'t3',badge:'tbl',label:'🩸 Blood'},
];
function getTier(e){return TIERS.find(t=>e>=t.min&&e<=t.max)||TIERS[0];}
function applyTheme(e){document.body.className=getTier(e).cls;}

// ══════════════════════════════════════════════
//  ELO / SAVE
// ══════════════════════════════════════════════
let elo    =+(localStorage.getItem('ah4Elo')||0);
let wins   =+(localStorage.getItem('ah4W')  ||0);
let losses =+(localStorage.getItem('ah4L')  ||0);
let draws  =+(localStorage.getItem('ah4D')  ||0);
let games  =+(localStorage.getItem('ah4G')  ||0);

const rates=e=>e>=3000?{w:10,l:30}:e>=2000?{w:15,l:25}:e>=1000?{w:20,l:20}:{w:30,l:10};

function saveAll(){
  localStorage.setItem('ah4Elo',elo);localStorage.setItem('ah4W',wins);
  localStorage.setItem('ah4L',losses);localStorage.setItem('ah4D',draws);
  localStorage.setItem('ah4G',games);
}
function updMenu(){
  document.getElementById('menuElo').textContent=elo;
  document.getElementById('hE').textContent=elo;
  const t=getTier(elo);
  const tb=document.getElementById('tierBadge');
  tb.textContent=t.label;tb.className='tier-badge '+t.badge;
  const r=rates(elo);
  document.getElementById('rW').textContent='+'+r.w;
  document.getElementById('rL').textContent='-'+r.l;
  document.getElementById('rD').textContent='+'+Math.floor(r.w/2);
  document.getElementById('sW').textContent=wins;
  document.getElementById('sL').textContent=losses;
  document.getElementById('sD').textContent=draws;
  document.getElementById('sG').textContent=games;
  applyTheme(elo);
}

// ══════════════════════════════════════════════
//  CANVAS
// ══════════════════════════════════════════════
const cv=document.getElementById('cv');
const cx=cv.getContext('2d');
let W=0,H=0;
function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const maxW=Math.min(vw-20,390);
  const maxH=vh-110;
  if(maxW/0.57<=maxH){W=maxW;H=Math.round(maxW/0.57);}
  else{H=Math.min(maxH,640);W=Math.round(H*0.57);}
  cv.width=W;cv.height=H;
}

// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const GOAL_R=0.40;
const MAX_G =7;
const MATCH_S=90; // 1:30

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let puck,pPad,aPad;
let sP=0,sA=0;
let active=false,scoring=false,ended=false;
let raf=null,lastTs=0;
let parts=[];
let gFlash=0,gFlashCol='',gMsg='',gMsgA=0;
let lastHitMs=0;
let timeLeft=MATCH_S,timerAcc=0;
let mX=200,mY=400;

function initObjs(){
  const pr=W*0.072;
  pPad={x:W/2,y:H*.82,r:pr,vx:0,vy:0};
  aPad={x:W/2,y:H*.18,r:pr,vx:0,vy:0};
  mX=W/2;mY=H*.82;
  puck=newPuck(Math.random()>.5);
  parts=[];
}
function newPuck(toP){
  const sp=W*.0070,a=(Math.random()-.5)*.7;
  return{x:W/2,y:H/2,vx:Math.sin(a)*sp,vy:Math.cos(a)*sp*(toP?1:-1),r:W*.042,trail:[]};
}

// ══════════════════════════════════════════════
//  INPUT — zero-lag
// ══════════════════════════════════════════════
function gPos(e,touch){
  const rc=cv.getBoundingClientRect(),sx=W/rc.width,sy=H/rc.height;
  const s=touch?e.touches[0]:e;
  return{x:(s.clientX-rc.left)*sx,y:(s.clientY-rc.top)*sy};
}
cv.addEventListener('mousemove',e=>{const p=gPos(e,false);mX=p.x;mY=p.y;});
cv.addEventListener('touchmove',e=>{e.preventDefault();const p=gPos(e,true);mX=p.x;mY=p.y;},{passive:false});
cv.addEventListener('touchstart',e=>{e.preventDefault();res();const p=gPos(e,true);mX=p.x;mY=p.y;},{passive:false});
cv.addEventListener('mousedown',()=>res());
cv.addEventListener('contextmenu',e=>e.preventDefault());

// ══════════════════════════════════════════════
//  PLAYER — instant
// ══════════════════════════════════════════════
function updPlayer(){
  const tx=Math.max(pPad.r,Math.min(W-pPad.r,mX));
  const ty=Math.max(H/2+pPad.r+2,Math.min(H-pPad.r,mY));
  pPad.vx=tx-pPad.x;pPad.vy=ty-pPad.y;
  pPad.x=tx;pPad.y=ty;
}

// ══════════════════════════════════════════════
//  AI
// ══════════════════════════════════════════════
function updAI(dt){
  const hy=H/2;
  const inAI=puck.y<hy,toAI=puck.vy<0;
  const spd=W*(.018+Math.min(elo,3500)/3500*.022);
  let tx,ty;
  if(inAI&&toAI){
    const tt=Math.abs((aPad.y-puck.y)/(puck.vy||.01));
    let px=puck.x+puck.vx*tt*(.38+Math.min(elo,2500)/2500*.44);
    px=Math.max(aPad.r*1.6,Math.min(W-aPad.r*1.6,px));
    tx=px;ty=Math.max(aPad.r*1.5,Math.min(hy-aPad.r-4,puck.y+H*.04));
  }else if(inAI){
    tx=W/2+(puck.x-W/2)*.5;
    tx=Math.max(aPad.r*1.5,Math.min(W-aPad.r*1.5,tx));ty=H*.14;
  }else{tx=W/2;ty=H*.16;}
  if(aPad.x<aPad.r*2.5)tx=Math.max(tx,W*.28);
  if(aPad.x>W-aPad.r*2.5)tx=Math.min(tx,W*.72);
  ty=Math.max(aPad.r*1.5,ty);
  const dx=tx-aPad.x,dy=ty-aPad.y,dist=Math.sqrt(dx*dx+dy*dy)||.01;
  const step=Math.min(spd*dt,dist);
  const ox=aPad.x,oy=aPad.y;
  aPad.x+=dx/dist*step;aPad.y+=dy/dist*step;
  aPad.vx=(aPad.x-ox)/(dt||1);aPad.vy=(aPad.y-oy)/(dt||1);
  aPad.x=Math.max(aPad.r,Math.min(W-aPad.r,aPad.x));
  aPad.y=Math.max(aPad.r,Math.min(hy-2,aPad.y));
}

// ══════════════════════════════════════════════
//  PHYSICS
// ══════════════════════════════════════════════
function hitPad(pad){
  const dx=puck.x-pad.x,dy=puck.y-pad.y,dist=Math.sqrt(dx*dx+dy*dy)||.01;
  const minD=puck.r+pad.r;
  if(dist>=minD)return false;
  const now=performance.now();
  if(now-lastHitMs<60)return false;
  lastHitMs=now;
  const nx=dx/dist,ny=dy/dist;
  puck.x+=nx*(minD-dist+1);puck.y+=ny*(minD-dist+1);
  const dot=puck.vx*nx+puck.vy*ny;
  if(dot<0){puck.vx-=2*dot*nx;puck.vy-=2*dot*ny;}
  puck.vx+=pad.vx*.52;puck.vy+=pad.vy*.52;
  const sp=Math.sqrt(puck.vx*puck.vx+puck.vy*puck.vy);
  const mn=W*.006,mx=W*.024;
  if(sp>0&&sp<mn){puck.vx=puck.vx/sp*mn;puck.vy=puck.vy/sp*mn;}
  if(sp>mx){puck.vx=puck.vx/sp*mx;puck.vy=puck.vy/sp*mx;}
  if(pad===pPad&&puck.vy>0)puck.vy=-Math.abs(puck.vy)*.5-W*.005;
  if(pad===aPad&&puck.vy<0)puck.vy= Math.abs(puck.vy)*.5+W*.005;
  const hard=Math.sqrt(pad.vx*pad.vx+pad.vy*pad.vy)>W*.006;
  sndHit(hard);
  spark(puck.x,puck.y,pad===pPad?'#ff9900':'#aa44ff',10);
  return true;
}

function updPuck(dt){
  puck.trail.push({x:puck.x,y:puck.y});if(puck.trail.length>14)puck.trail.shift();
  puck.x+=puck.vx*dt;puck.y+=puck.vy*dt;
  puck.vx*=.9995;puck.vy*=.9995;
  const sp=Math.sqrt(puck.vx*puck.vx+puck.vy*puck.vy);
  if(sp<W*.004){const a=Math.random()*Math.PI*2;puck.vx=Math.cos(a)*W*.005;puck.vy=Math.sin(a)*W*.005*(puck.y<H/2?1:-1);}
  const gw=W*GOAL_R,gx0=(W-gw)/2,gx1=(W+gw)/2;
  if(puck.x-puck.r<0){puck.x=puck.r;puck.vx=Math.abs(puck.vx)*.94;sndWall();spark(puck.x,puck.y,'#fff',4);}
  if(puck.x+puck.r>W){puck.x=W-puck.r;puck.vx=-Math.abs(puck.vx)*.94;sndWall();spark(puck.x,puck.y,'#fff',4);}
  if(puck.y-puck.r<0){
    if(puck.x>gx0&&puck.x<gx1){onGoal('player');return;}
    puck.y=puck.r;puck.vy=Math.abs(puck.vy)*.92;sndWall();spark(puck.x,puck.y,'#fff',4);
  }
  if(puck.y+puck.r>H){
    if(puck.x>gx0&&puck.x<gx1){onGoal('ai');return;}
    puck.y=H-puck.r;puck.vy=-Math.abs(puck.vy)*.92;sndWall();spark(puck.x,puck.y,'#fff',4);
  }
}

// ══════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════
function fmtTime(s){
  return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}
function updTimerUI(){
  const el=document.getElementById('hTimer');
  el.textContent=fmtTime(timeLeft);
  el.className='hud-timer'+(timeLeft<=15?' warn':'');
}
function tickTimer(dt){
  if(!active||scoring||ended)return;
  // dt is in "frames" at 60fps baseline, convert to ms
  timerAcc+=dt*16.667;
  if(timerAcc>=1000){
    timerAcc-=1000;
    timeLeft=Math.max(0,timeLeft-1);
    updTimerUI();
    if(timeLeft<=10&&timeLeft>0)sndTick();
    if(timeLeft===0){onTimeUp();}
  }
}

// ══════════════════════════════════════════════
//  GOAL
// ══════════════════════════════════════════════
function onGoal(who){
  if(!active||scoring||ended)return;
  scoring=true;active=false;
  if(who==='player'){
    sP++;gFlashCol='rgba(40,210,80,.3)';gMsg='⚽ ГОЛ!';sndGoal('win');
    spark(W/2,0,'#22ee66',42);
  }else{
    sA++;gFlashCol='rgba(255,60,60,.25)';gMsg='😬 Пропустил!';sndGoal('lose');
    spark(W/2,H,'#ff4444',42);
  }
  gFlash=1;gMsgA=1;
  document.getElementById('hP').textContent=sP;
  document.getElementById('hA').textContent=sA;
  document.getElementById('hMsg').textContent=gMsg;
  if(sP>=MAX_G||sA>=MAX_G){setTimeout(()=>endGame('score'),1300);}
  else{setTimeout(()=>{if(!ended){initObjs();active=true;scoring=false;document.getElementById('hMsg').textContent='';}},1500);}
}

function onTimeUp(){
  if(ended)return;
  active=false;scoring=true;
  // Brief flash then show result
  gMsg='⏱ Время!';gMsgA=1;
  gFlashCol='rgba(255,220,0,.3)';gFlash=1;
  document.getElementById('hMsg').textContent='⏱ Время!';
  setTimeout(()=>endGame('time'),1100);
}

// ══════════════════════════════════════════════
//  END GAME
// ══════════════════════════════════════════════
function endGame(reason){
  if(ended)return;
  ended=true;
  cancelAnimationFrame(raf);

  let outcome; // 'win'|'lose'|'draw'
  if(reason==='score'){
    outcome=sP>=MAX_G?'win':'lose';
  }else{
    if(sP>sA)outcome='win';
    else if(sA>sP)outcome='lose';
    else outcome='draw';
  }

  const r=rates(elo);
  let diff=0;
  if(outcome==='win')       {diff=r.w; elo=Math.max(0,elo+diff);wins++;}
  else if(outcome==='lose') {diff=-r.l;elo=Math.max(0,elo+diff);losses++;}
  else                      {diff=Math.floor(r.w/2);elo=Math.max(0,elo+diff);draws++;}
  games++;saveAll();updMenu();applyTheme(elo);

  sndGoal(outcome);

  const labels={win:'🏆 Победа!',lose:'😢 Поражение',draw:'🤝 Ничья!'};
  const reasons={score:'По счёту',time:'По истечении времени'};
  document.getElementById('ovRes').textContent=labels[outcome];
  document.getElementById('ovRes').className='ov-result '+outcome;
  document.getElementById('ovSc').textContent=sP+' : '+sA;
  document.getElementById('ovReason').textContent=reasons[reason]||'';

  let html;
  if(outcome==='draw'){
    html=`ЭЛО: <span class="edp">+${diff}</span> → <span class="enew">${elo}</span>`;
  }else{
    const s=outcome==='win'?'+':'';
    const cl=outcome==='win'?'edp':'edn';
    html=`ЭЛО: <span class="${cl}">${s}${Math.abs(diff)}</span> → <span class="enew">${elo}</span>`;
  }
  document.getElementById('ovEl').innerHTML=html;
  document.getElementById('overlay').style.display='flex';
}

// ══════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════
function spark(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=(Math.random()*.8+.2)*W*.014;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:Math.random()*3.5+1,col,life:1,dec:.02+Math.random()*.025});
  }
}
function tickParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vx*=.91;p.vy*=.91;p.vy+=.1*dt;
    p.life-=p.dec*dt;
    if(p.life<=0)parts.splice(i,1);
  }
}

// ══════════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════════
function drawField(){
  // Ice / table
  const bg=cx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a70ff');bg.addColorStop(.5,'#0044bb');bg.addColorStop(1,'#1a70ff');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  // Subtle gloss blobs
  cx.save();cx.globalAlpha=.04;
  for(let i=0;i<6;i++){
    cx.fillStyle='#fff';
    cx.beginPath();cx.ellipse(W*(.08+i*.17),H*.32,W*.035,H*.48,0,0,Math.PI*2);cx.fill();
  }
  cx.restore();

  // Outer border
  cx.save();
  cx.strokeStyle='rgba(255,255,255,.48)';cx.lineWidth=5;cx.lineJoin='round';
  cx.beginPath();cx.roundRect(3,3,W-6,H-6,12);cx.stroke();
  cx.strokeStyle='rgba(0,0,0,.1)';cx.lineWidth=2;
  cx.beginPath();cx.roundRect(6,6,W-12,H-12,10);cx.stroke();
  cx.restore();

  // Center dashed line
  cx.save();cx.strokeStyle='rgba(255,255,255,.44)';cx.lineWidth=2.5;
  cx.setLineDash([11,8]);
  cx.beginPath();cx.moveTo(10,H/2);cx.lineTo(W-10,H/2);cx.stroke();
  cx.setLineDash([]);cx.restore();

  // Center circle
  cx.save();cx.strokeStyle='rgba(255,255,255,.33)';cx.lineWidth=2.5;
  cx.beginPath();cx.arc(W/2,H/2,W*.1,0,Math.PI*2);cx.stroke();
  cx.fillStyle='rgba(255,255,255,.38)';
  cx.beginPath();cx.arc(W/2,H/2,5,0,Math.PI*2);cx.fill();
  cx.restore();

  // Blue zone lines
  [[H*.33],[H*.67]].forEach(([y])=>{
    cx.save();cx.strokeStyle='rgba(255,255,255,.28)';cx.lineWidth=2.5;
    cx.beginPath();cx.moveTo(10,y);cx.lineTo(W-10,y);cx.stroke();cx.restore();
  });

  // Face-off dots
  [[.27,.22],[.73,.22],[.27,.78],[.73,.78]].forEach(([rx,ry])=>{
    cx.save();cx.fillStyle='rgba(255,255,255,.22)';
    cx.beginPath();cx.arc(W*rx,H*ry,4,0,Math.PI*2);cx.fill();cx.restore();
  });

  const gw=W*GOAL_R,gx0=(W-gw)/2,gx1=(W+gw)/2,gd=H*.038;

  // AI goal top — red
  cx.save();
  cx.fillStyle='rgba(255,50,50,.15)';
  cx.beginPath();cx.roundRect(gx0,0,gw,gd,{upperLeft:0,upperRight:0,lowerLeft:9,lowerRight:9});cx.fill();
  cx.save();cx.globalAlpha=.27;cx.strokeStyle='#ff5050';cx.lineWidth=.7;
  for(let x=gx0;x<=gx1;x+=10){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,gd);cx.stroke();}
  for(let y=0;y<=gd;y+=9){cx.beginPath();cx.moveTo(gx0,y);cx.lineTo(gx1,y);cx.stroke();}
  cx.restore();
  cx.strokeStyle='#ff2222';cx.lineWidth=4;cx.lineJoin='round';
  cx.beginPath();cx.moveTo(gx0,2);cx.lineTo(gx0,gd);cx.lineTo(gx1,gd);cx.lineTo(gx1,2);cx.stroke();
  cx.strokeStyle='#ff4444';cx.lineWidth=5;cx.shadowColor='#ff2222';cx.shadowBlur=10;
  cx.beginPath();cx.moveTo(gx0,gd);cx.lineTo(gx1,gd);cx.stroke();
  [gx0,gx1].forEach(px=>{
    cx.shadowBlur=0;cx.fillStyle='#cc1111';
    cx.beginPath();cx.arc(px,gd,5,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#fff';cx.lineWidth=2;cx.beginPath();cx.arc(px,gd,5,0,Math.PI*2);cx.stroke();
  });
  cx.restore();

  // Player goal bottom — green
  cx.save();
  cx.fillStyle='rgba(40,220,90,.15)';
  cx.beginPath();cx.roundRect(gx0,H-gd,gw,gd,{upperLeft:9,upperRight:9,lowerLeft:0,lowerRight:0});cx.fill();
  cx.save();cx.globalAlpha=.27;cx.strokeStyle='#44ff88';cx.lineWidth=.7;
  for(let x=gx0;x<=gx1;x+=10){cx.beginPath();cx.moveTo(x,H-gd);cx.lineTo(x,H);cx.stroke();}
  for(let y=H-gd;y<=H;y+=9){cx.beginPath();cx.moveTo(gx0,y);cx.lineTo(gx1,y);cx.stroke();}
  cx.restore();
  cx.strokeStyle='#22cc55';cx.lineWidth=4;cx.lineJoin='round';
  cx.beginPath();cx.moveTo(gx0,H-2);cx.lineTo(gx0,H-gd);cx.lineTo(gx1,H-gd);cx.lineTo(gx1,H-2);cx.stroke();
  cx.strokeStyle='#44ee88';cx.lineWidth=5;cx.shadowColor='#22cc55';cx.shadowBlur=10;
  cx.beginPath();cx.moveTo(gx0,H-gd);cx.lineTo(gx1,H-gd);cx.stroke();
  [gx0,gx1].forEach(px=>{
    cx.shadowBlur=0;cx.fillStyle='#117733';
    cx.beginPath();cx.arc(px,H-gd,5,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#fff';cx.lineWidth=2;cx.beginPath();cx.arc(px,H-gd,5,0,Math.PI*2);cx.stroke();
  });
  cx.restore();

  // Screen flash
  if(gFlash>0){
    cx.save();cx.globalAlpha=gFlash*.72;cx.fillStyle=gFlashCol;cx.fillRect(0,0,W,H);cx.restore();
    gFlash-=.042;if(gFlash<0)gFlash=0;
  }

  // Goal / time-up text
  if(gMsgA>0){
    const sc=1+(1-gMsgA)*.28;
    cx.save();cx.globalAlpha=Math.min(gMsgA,1);
    cx.translate(W/2,H/2);cx.scale(sc,sc);cx.translate(-W/2,-H/2);
    cx.font=`${W*.096}px 'Lilita One',cursive`;
    cx.textAlign='center';cx.textBaseline='middle';
    cx.strokeStyle='rgba(0,0,0,.55)';cx.lineWidth=W*.013;cx.lineJoin='round';
    cx.strokeText(gMsg,W/2,H/2);
    cx.fillStyle='#fff';cx.fillText(gMsg,W/2,H/2);
    cx.restore();gMsgA-=.022;
  }
}

function drawTrail(){
  for(let i=1;i<puck.trail.length;i++){
    const t=i/puck.trail.length;
    cx.save();cx.globalAlpha=t*.38;
    cx.fillStyle=`rgba(210,230,255,${t})`;
    cx.beginPath();cx.arc(puck.trail[i].x,puck.trail[i].y,puck.r*t*.55,0,Math.PI*2);cx.fill();
    cx.restore();
  }
}

function drawPuck(){
  drawTrail();
  const x=puck.x,y=puck.y,r=puck.r;
  // Shadow
  cx.save();cx.globalAlpha=.24;cx.fillStyle='#000';
  cx.beginPath();cx.ellipse(x+r*.1,y+r*.26,r*1.05,r*.38,0,0,Math.PI*2);cx.fill();cx.restore();
  // Body
  cx.save();
  const gb=cx.createRadialGradient(x-r*.3,y-r*.35,r*.04,x,y,r);
  gb.addColorStop(0,'#666');gb.addColorStop(.4,'#222');gb.addColorStop(1,'#060606');
  cx.fillStyle=gb;
  cx.strokeStyle='rgba(0,0,0,.72)';cx.lineWidth=r*.14;cx.lineJoin='round';
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.stroke();
  // Inner ring detail
  cx.strokeStyle='rgba(255,255,255,.1)';cx.lineWidth=1.5;
  cx.beginPath();cx.arc(x,y,r*.5,0,Math.PI*2);cx.stroke();
  // Gloss
  const gh=cx.createRadialGradient(x-r*.3,y-r*.38,0,x-r*.1,y-r*.14,r*.65);
  gh.addColorStop(0,'rgba(255,255,255,.44)');gh.addColorStop(.5,'rgba(255,255,255,.05)');gh.addColorStop(1,'rgba(255,255,255,0)');
  cx.fillStyle=gh;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
  cx.restore();
}

function drawPaddle(pad,isP){
  const x=pad.x,y=pad.y,r=pad.r;
  // Shadow
  cx.save();cx.globalAlpha=.2;cx.fillStyle='#000';
  cx.beginPath();cx.ellipse(x+r*.08,y+r*.3,r*1.1,r*.4,0,0,Math.PI*2);cx.fill();cx.restore();
  cx.save();
  const c1=isP?'#ffaa00':'#cc44ff';
  const c2=isP?'#ff5500':'#8800cc';
  const cR=isP?'#fff5cc':'#f0ccff';
  const gb=cx.createRadialGradient(x-r*.25,y-r*.3,r*.03,x,y,r);
  gb.addColorStop(0,c1);gb.addColorStop(.65,c2);gb.addColorStop(1,'#180010');
  cx.fillStyle=gb;
  cx.strokeStyle='rgba(0,0,0,.55)';cx.lineWidth=r*.18;cx.lineJoin='round';
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.stroke();
  // Ring stripe
  cx.strokeStyle=cR;cx.lineWidth=r*.07;
  cx.beginPath();cx.arc(x,y,r*.72,0,Math.PI*2);cx.stroke();
  // Centre knob
  const gk=cx.createRadialGradient(x-r*.1,y-r*.12,0,x,y,r*.3);
  gk.addColorStop(0,'rgba(255,255,255,.68)');gk.addColorStop(.5,c1+'bb');gk.addColorStop(1,'transparent');
  cx.fillStyle=gk;cx.beginPath();cx.arc(x,y,r*.3,0,Math.PI*2);cx.fill();
  // Gloss
  const gg=cx.createRadialGradient(x-r*.3,y-r*.4,0,x-r*.15,y-r*.2,r*.55);
  gg.addColorStop(0,'rgba(255,255,255,.5)');gg.addColorStop(1,'rgba(255,255,255,0)');
  cx.fillStyle=gg;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
  cx.restore();
}

function drawParts(){
  for(const p of parts){
    cx.save();cx.globalAlpha=p.life*.88;
    cx.fillStyle=p.col;
    cx.strokeStyle='rgba(0,0,0,.28)';cx.lineWidth=1;
    cx.beginPath();cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);cx.fill();cx.stroke();
    cx.restore();
  }
}

// ══════════════════════════════════════════════
//  LOOP
// ══════════════════════════════════════════════
function loop(ts){
  const dt=Math.min((ts-lastTs)/16.667,3);lastTs=ts;
  if(active){
    updPlayer();updAI(dt);updPuck(dt);
    hitPad(pPad);hitPad(aPad);
    tickTimer(dt);
  }
  tickParts(dt);
  drawField();
  drawPaddle(aPad,false);drawPaddle(pPad,true);
  drawPuck();drawParts();
  raf=requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════════
function startGame(){
  sndClick();res();
  document.getElementById('overlay').style.display='none';
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='flex';
  cancelAnimationFrame(raf);
  resize();
  sP=0;sA=0;scoring=false;ended=false;
  gFlash=0;gMsgA=0;timeLeft=MATCH_S;timerAcc=0;
  document.getElementById('hP').textContent='0';
  document.getElementById('hA').textContent='0';
  document.getElementById('hE').textContent=elo;
  document.getElementById('hMsg').textContent='';
  updTimerUI();
  parts=[];initObjs();active=true;
  lastTs=performance.now();
  raf=requestAnimationFrame(loop);
}
function goMenu(){
  sndClick();cancelAnimationFrame(raf);active=false;ended=true;
  document.getElementById('overlay').style.display='none';
  document.getElementById('game').style.display='none';
  document.getElementById('menu').style.display='flex';
  updMenu();
}
window.addEventListener('resize',()=>{
  if(document.getElementById('game').style.display!=='none'){resize();initObjs();}
});

// Init
updMenu();applyTheme(elo);
